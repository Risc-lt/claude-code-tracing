services:
  litellm-proxy:
    build: ./proxy
    container_name: litellm-proxy
    ports:
      - "4000:4000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-my-litellm-key}
    volumes:
      - ../visualizer/logs:/logs
    restart: unless-stopped

  claude:
    build: ./claude
    container_name: claude-code
    environment:
      - ANTHROPIC_BASE_URL=http://litellm-proxy:4000
      - ANTHROPIC_AUTH_TOKEN=${LITELLM_MASTER_KEY:-sk-my-litellm-key}
    volumes:
      - workspace:/workspace
      - ../visualizer/logs:/logs
    depends_on:
      - litellm-proxy
    stdin_open: true         # needed for interactive claude sessions
    tty: true

  visualizer:
    build:
      context: ..
      dockerfile: docker/visualizer/Dockerfile
    container_name: visualizer
    ports:
      - "8080:8080"
    volumes:
      - ../visualizer/logs:/app/logs
    depends_on:
      - litellm-proxy

volumes:
  workspace:    # persists your working repo
